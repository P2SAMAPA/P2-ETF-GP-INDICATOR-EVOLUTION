name: Daily GP Indicator Evolution

on:
  schedule:
    - cron: "0 3 * * *"  # Daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe to run (FI_COMMODITIES / EQUITY_SECTORS / COMBINED)"
        required: false
        default: "all"

jobs:
  evolve:
    name: Evolve — ${{ matrix.universe }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        universe:
          - FI_COMMODITIES
          - EQUITY_SECTORS
          - COMBINED

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install numpy (pinned)
        run: pip install "numpy>=1.24.0,<2.0.0"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GP evolution — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GP_UNIVERSE: ${{ matrix.universe }}
        run: python trainer.py

      - name: Print summary — ${{ matrix.universe }}
        run: |
          python3 - << 'PYEOF'
          import json, glob
          files = sorted(glob.glob("results_*.json"))
          if not files:
              print("Results pushed directly to HF")
          else:
              with open(files[-1]) as f:
                  data = json.load(f)
              uni = list(data.get("universes", {}).keys())[0]
              print(f"\n=== {uni} ===")
              results = data["universes"][uni]
              for ticker, info in sorted(
                  results["tickers"].items(),
                  key=lambda x: x[1].get("rank", 99)
              )[:5]:
                  print(f"  #{info['rank']} {ticker}  MeanSortino={info['mean_sortino']:.3f}  WinRate={info['win_rate_pct']:.0f}%")
          PYEOF

      - name: Upload artifacts — ${{ matrix.universe }}
        uses: actions/upload-artifact@v4
        with:
          name: gp-results-${{ matrix.universe }}-${{ github.run_id }}
          path: results_*.json
          retention-days: 30
          if-no-files-found: ignore
